<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — YLearn AI</title>
  <meta name="description" content="Your AI-powered learning dashboard — notes, summary, glossary, and live AI chat." />
  <link rel="stylesheet" href="./style.css" />
  <link rel="stylesheet" href="./dashboard.css" />
</head>
<body>
  <div class="bg-orbs"></div>

  <!-- ── Left Sidebar ───────────────────────────────────── -->
  <aside class="left-sidebar" id="left-sidebar">
    <div class="sidebar-logo">
      <div class="logo-icon">🎓</div>
      <span>YLearn</span>
    </div>

    <nav class="sidebar-nav">
      <a href="./index.html" class="sidebar-link">
        <span class="sidebar-icon">🏠</span> Home
      </a>
      <a href="./dashboard.html" class="sidebar-link active">
        <span class="sidebar-icon">📊</span> Dashboard
      </a>
      <a href="./quiz.html" class="sidebar-link" id="go-quiz-side">
        <span class="sidebar-icon">🧠</span> Mock Test
      </a>
      <a href="./results.html" class="sidebar-link">
        <span class="sidebar-icon">🏆</span> Results
      </a>
    </nav>

    <div class="sidebar-footer">
      <div class="sidebar-video-card" id="sidebar-video-card">
        <img id="side-thumb" src="" alt="thumb" />
        <div class="side-video-info">
          <div id="side-title" class="side-title">—</div>
          <div id="side-meta" class="side-meta">—</div>
        </div>
      </div>
      <button class="btn btn-outline btn-sm" onclick="window.location.href='./index.html'">
        ＋ New Video
      </button>
    </div>
  </aside>

  <!-- ── Main Shell ──────────────────────────────────────── -->
  <div class="dash-shell">

    <!-- Top Bar -->
    <header class="dash-topbar">
      <button class="sidebar-toggle" id="sidebar-toggle" onclick="toggleSidebar()">☰</button>
      <div class="topbar-tabs">
        <button class="dash-tab active" onclick="switchDashTab('summary')" id="dtab-summary">📄 Summary</button>
        <button class="dash-tab" onclick="switchDashTab('notes')" id="dtab-notes">📝 Notes</button>
        <button class="dash-tab" onclick="switchDashTab('glossary')" id="dtab-glossary">📚 Glossary</button>
      </div>
      <div class="topbar-actions">
        <a id="yt-link" href="#" target="_blank" class="btn btn-outline btn-sm">▶ Watch</a>
        <button class="btn btn-primary btn-sm" onclick="window.location.href='./quiz.html'">🧠 Take Quiz</button>
      </div>
    </header>

    <!-- Content + Chat wrapper -->
    <div class="dash-body">

      <!-- ── Main Content ────────────────────────────────── -->
      <main class="dash-content">

        <!-- Video Banner -->
        <div class="db-video-banner glass-card" id="db-video-banner">
          <img id="db-thumb" src="" alt="thumbnail" class="db-thumb" />
          <div class="db-video-info">
            <h1 id="db-title" class="db-video-title">Loading…</h1>
            <div class="db-meta" id="db-meta"></div>
          </div>
        </div>

        <!-- Summary Panel -->
        <div class="dash-panel active glass-card" id="dpanel-summary">
          <div class="section-title"><div class="icon">📄</div>AI Summary</div>
          <div id="db-summary-content">
            <div class="skel-block"></div>
            <div class="skel-block w-75"></div>
            <div class="skel-block w-50 mt-16"></div>
          </div>
        </div>

        <!-- Notes Panel -->
        <div class="dash-panel glass-card" id="dpanel-notes">
          <div class="section-title"><div class="icon">📝</div>Key Notes</div>
          <div id="db-notes-content">
            <div class="skel-block"></div>
            <div class="skel-block w-75 mt-8"></div>
            <div class="skel-block w-50 mt-8"></div>
          </div>
        </div>

        <!-- Glossary Panel -->
        <div class="dash-panel glass-card" id="dpanel-glossary">
          <div class="section-title"><div class="icon">📚</div>Key Terms</div>
          <div id="db-glossary-content">
            <div class="glossary-grid">
              <div class="skel-card"></div>
              <div class="skel-card"></div>
              <div class="skel-card"></div>
            </div>
          </div>
        </div>

        <!-- Footer Actions -->
        <div class="dash-footer-actions">
          <button class="btn btn-primary btn-lg" onclick="window.location.href='./quiz.html'">🧠 Take Mock Test →</button>
          <button class="btn btn-outline" onclick="window.print()">🖨️ Print Notes</button>
          <button class="btn btn-outline" onclick="window.location.href='./index.html'">← New Video</button>
        </div>
      </main>

      <!-- ── Right Chat Sidebar ──────────────────────────── -->
      <aside class="chat-sidebar glass-card" id="chat-sidebar">
        <div class="chat-header">
          <div class="chat-header-title">
            <div class="chat-ai-dot"></div>
            Ask AI About This Video
          </div>
          <button class="chat-close-btn" onclick="toggleChat()" title="Hide chat">✕</button>
        </div>

        <div class="chat-messages" id="chat-messages">
          <div class="chat-bubble ai">
            <div class="bubble-avatar">🤖</div>
            <div class="bubble-text">
              Hi! I've read the video transcript. Ask me anything about the content and I'll help you understand it better.
            </div>
          </div>
        </div>

        <div class="chat-input-area">
          <textarea
            id="chat-input"
            class="chat-textarea"
            placeholder="Ask a question about the video…"
            rows="2"
            onkeydown="handleChatKey(event)"
          ></textarea>
          <button class="chat-send-btn" id="chat-send-btn" onclick="sendChatMessage()">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
          </button>
        </div>
      </aside>
    </div><!-- /.dash-body -->
  </div><!-- /.dash-shell -->

  <!-- Floating Chat Toggle (when chat is hidden) -->
  <button class="chat-fab" id="chat-fab" onclick="toggleChat()" title="Ask AI">
    💬
  </button>

  <!-- Loading & Toasts -->
  <div class="loading-overlay" id="loading">
    <div class="spinner"></div>
    <p id="loading-msg">Generating with AI…</p>
  </div>
  <div class="toast-container" id="toasts"></div>

  <script src="./app.js"></script>
  <script src="./dashboard.js"></script>
</body>
</html>
